name: "merger-cli"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "Diogo Toporcov <diogotoporcov@gmail.com>"
description: "${DESCRIPTION}"
homepage: "${HOMEPAGE}"
license: "GPL-3.0-or-later"
depends:
  - libmagic1
contents:
  - src: dist/merger-cli
    dst: /usr/lib/merger-cli
  - src: /usr/lib/merger-cli/merger
    dst: /usr/bin/merger
    type: symlink
