name: Publish to PyPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  version-check:
    uses: ./.github/workflows/version-check.yml

  build-and-publish:
    needs: [test, version-check]
    if: ${{ needs.version-check.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-skipped:
    needs: [test, version-check]
    if: ${{ needs.test.result == 'success' && needs.version-check.outputs.should_publish != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain why publish was skipped
        run: |
          echo "Skipping PyPI publish because version ${{ needs.version-check.outputs.version }} of ${{ needs.version-check.outputs.package_name }} already exists on PyPI."