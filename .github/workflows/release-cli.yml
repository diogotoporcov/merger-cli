name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Run CI
    uses: ./.github/workflows/ci.yml

  build_artifacts:
    name: Build artifacts (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./packages/merger-plugin-api[test]"
          pip install "./packages/merger-cli[test,dev]"

      - name: Install libmagic (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install libmagic (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libmagic

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet tool install --global wix --version 5.0.2
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build and verify
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            bash scripts/test_linux.sh
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            bash scripts/test_macos.sh
          else
            powershell -ExecutionPolicy Bypass -File scripts/test_windows.ps1
          fi
        shell: bash

      - name: Set package version and metadata
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#cli-v}"
          VERSION="${VERSION#api-v}"
          VERSION="${VERSION#v}"
          echo "PKG_VERSION=${VERSION}" >> "$GITHUB_ENV"

          META="$(python scripts/metadata_helper.py)"
          DESC="$(echo "$META" | grep "^description=" | cut -d'=' -f2)"
          HP="$(echo "$META" | grep "^homepage=" | cut -d'=' -f2)"

          echo "DESCRIPTION=$DESC" >> "$GITHUB_ENV"
          echo "HOMEPAGE=$HP" >> "$GITHUB_ENV"
        shell: bash

      - name: Create .deb package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          NFPM_VERSION="2.41.3"
          curl -L "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" -o nfpm.tar.gz
          tar -xzf nfpm.tar.gz nfpm
          ./nfpm package --config packaging/nfpm.yaml --target dist/merger-cli.deb
        env:
          VERSION: ${{ env.PKG_VERSION }}
          DESCRIPTION: ${{ env.DESCRIPTION }}
          HOMEPAGE: ${{ env.HOMEPAGE }}

      - name: Normalize release artifact names
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "Windows build produces the installer directly"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv dist/merger-cli dist/merger-cli-macos
            tar -czf dist/merger-cli-macos.tar.gz -C dist merger-cli-macos
          else
            echo "Linux build produces files needed for the .deb package"
          fi
        shell: bash

      - name: Calculate macOS SHA256
        if: matrix.os == 'macos-latest'
        run: |
          shasum -a 256 dist/merger-cli-macos.tar.gz | awk '{print $1}' > dist/macos_sha256.txt
        shell: bash

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-release-artifacts-${{ matrix.os }}
          if-no-files-found: error
          path: |
            dist/*.msi
            dist/*.deb
            dist/*.tar.gz
            dist/macos_sha256.txt

  publish_cli_package:
    name: Publish CLI package to PyPI
    needs: build_artifacts
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution
        run: |
          cd packages/merger-cli
          python -m build
          mv dist ../../dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_github_release:
    name: Publish GitHub Release
    needs:
      - build_artifacts
      - publish_cli_package
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: cli-release-artifacts-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ./*.msi ./*.deb ./*.tar.gz > checksums.txt
        shell: bash

      - name: Detect release metadata from tag
        id: release_meta
        run: |
          TAG_LOWER="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')"
          VERSION="${GITHUB_REF_NAME#cli-}"

          if [[ "$TAG_LOWER" == *alpha* ]] || \
             [[ "$TAG_LOWER" == *beta* ]] || \
             [[ "$TAG_LOWER" == *pre* ]] || \
             [[ "$TAG_LOWER" == *preview* ]] || \
             [[ "$TAG_LOWER" == *rc* ]] || \
             [[ "$TAG_LOWER" == *dev* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

          echo "release_name=Merger CLI ${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          files: |
            ./artifacts/*.msi
            ./artifacts/*.deb
            ./artifacts/*.tar.gz
            ./artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_homebrew_formula:
    name: Update Homebrew formula
    needs: publish_github_release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/packaging

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: cli-release-artifacts-*
          merge-multiple: true

      - name: Update formula
        run: |
          SHA256="$(cat ./artifacts/macos_sha256.txt)"
          TAG_NAME="${{ github.ref_name }}"

          META="$(python scripts/metadata_helper.py)"
          DESC="$(echo "$META" | grep "^description=" | cut -d'=' -f2)"
          HP="$(echo "$META" | grep "^homepage=" | cut -d'=' -f2)"

          cp Formula/merger-cli.rb.template Formula/merger-cli.rb
          sed -i "s|%%DESCRIPTION%%|$DESC|g" Formula/merger-cli.rb
          sed -i "s|%%HOMEPAGE%%|$HP|g" Formula/merger-cli.rb
          sed -i "s|%%TAG_NAME%%|$TAG_NAME|g" Formula/merger-cli.rb
          sed -i "s|%%SHA256%%|$SHA256|g" Formula/merger-cli.rb

      - name: Commit and push formula update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Formula/merger-cli.rb

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update homebrew formula to ${{ github.ref_name }}"
            git push origin HEAD:feature/packaging
          fi