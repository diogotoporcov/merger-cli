name: Build and Release Binaries

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  build:
    name: Build for ${{ matrix.os }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./src/merger-api
          pip install . pyinstaller

      - name: (Linux) Install libmagic
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: (macOS) Install libmagic
        if: matrix.os == 'macos-latest'
        run: brew install libmagic

      - name: Build with PyInstaller
        run: pyinstaller packaging/merger.spec

      - name: (Windows) Create Installer
        if: matrix.os == 'windows-latest'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging/installer.iss
        shell: powershell

      - name: Set Package Version
        run: |
          VERSION=${{ github.ref_name }}
          # Strip prefixes cli-v, api-v, or v
          VERSION=${VERSION#cli-v}
          VERSION=${VERSION#api-v}
          VERSION=${VERSION#v}
          echo "PKG_VERSION=${VERSION}" >> $GITHUB_ENV
        shell: bash

      - name: (Linux) Create .deb Package
        if: matrix.os == 'ubuntu-latest'
        uses: goreleaser/nfpm-action@v2
        with:
          args: package --config packaging/nfpm.yaml --target dist/merger-cli.deb
        env:
          VERSION: ${{ env.PKG_VERSION }}

      - name: Prepare Binary Names
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/merger-cli.exe dist/merger-cli-windows.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv dist/merger-cli dist/merger-cli-macos
            tar -czf dist/merger-cli-macos.tar.gz -C dist merger-cli-macos
          else
            mv dist/merger-cli dist/merger-cli-linux
          fi
        shell: bash

      - name: Calculate and Save SHA256 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          shasum -a 256 dist/merger-cli-macos.tar.gz | awk '{print $1}' > dist/macos_sha256.txt
        shell: bash

      - name: Upload SHA256 Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-sha256
          path: dist/macos_sha256.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/merger-cli-windows.exe
            dist/merger-cli-windows-installer.exe
            dist/merger-cli-linux
            dist/merger-cli.deb
            dist/merger-cli-macos
            dist/merger-cli-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download SHA256 Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-sha256

      - name: Update Formula
        run: |
          SHA256=$(cat macos_sha256.txt)
          VERSION=${{ github.ref_name }}
          python scripts/update_formula.py "$VERSION" "$SHA256"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/merger-cli.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update homebrew formula to ${{ github.ref_name }}"
            git push origin master
          fi
