name: Version Check

on:
  pull_request:
    branches: ["master"]
  workflow_call:
    outputs:
      should_publish:
        description: "Whether this version should be published to PyPI"
        value: ${{ jobs.check-version.outputs.should_publish }}
      pypi_exists:
        description: "Whether this version already exists on PyPI"
        value: ${{ jobs.check-version.outputs.pypi_exists }}
      github_exists:
        description: "Whether this version already exists on GitHub releases"
        value: ${{ jobs.check-version.outputs.github_exists }}
      package_name:
        description: "Package name from pyproject.toml"
        value: ${{ jobs.check-version.outputs.package_name }}
      version:
        description: "Package version from pyproject.toml"
        value: ${{ jobs.check-version.outputs.version }}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      pypi_exists: ${{ steps.check.outputs.pypi_exists }}
      github_exists: ${{ steps.check.outputs.github_exists }}
      package_name: ${{ steps.check.outputs.package_name }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - id: check
        name: Check version availability on PyPI and GitHub
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/version_check.py