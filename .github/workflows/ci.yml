name: Tests

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - 'api-v*'
      - 'cli-v*'
      - 'v*'
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-ubuntu:
    name: test (ubuntu, ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    if: ${{ !startsWith(github.ref, 'refs/tags/api-v') }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/merger-cli/pyproject.toml
            packages/merger-plugin-api/pyproject.toml

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./packages/merger-plugin-api[test]"
          pip install "./packages/merger-cli[test]"

      - name: Run tests
        run: |
          if [ -d "packages/merger-cli/tests" ] && [ -n "$(find packages/merger-cli/tests -name 'test_*.py' 2>/dev/null)" ]; then
            pytest --cov=merger_cli packages/merger-cli/tests/
          else
            echo "No tests found in packages/merger-cli/tests/, skipping"
            exit 0
          fi

  test-api:
    name: test-api (ubuntu, ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    if: ${{ !startsWith(github.ref, 'refs/tags/cli-v') }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./packages/merger-plugin-api[test]"
      - name: Run tests
        run: |
          if [ -d "packages/merger-plugin-api/tests" ] && [ -n "$(find packages/merger-plugin-api/tests -name 'test_*.py' 2>/dev/null)" ]; then
            pytest packages/merger-plugin-api/tests/
          else
            echo "No tests found in packages/merger-plugin-api/tests/, skipping"
            exit 0
          fi

  test-platforms:
    name: test (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    if: ${{ !startsWith(github.ref, 'refs/tags/api-v') }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/merger-cli/pyproject.toml
            packages/merger-plugin-api/pyproject.toml

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libmagic

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./packages/merger-plugin-api[test]"
          pip install "./packages/merger-cli[test]"

      - name: Run tests
        run: |
          if [ -d "packages/merger-cli/tests" ] && [ -n "$(find packages/merger-cli/tests -name 'test_*.py' 2>/dev/null)" ]; then
            pytest --cov=merger_cli packages/merger-cli/tests/
          else
            echo "No tests found in packages/merger-cli/tests/, skipping"
            exit 0
          fi

  tests-passed:
    name: tests-passed
    runs-on: ubuntu-latest
    needs:
      - test-ubuntu
      - test-api
      - test-platforms
      - test-standalone
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}

    steps:
      - name: All tests passed
        run: echo "All tests passed"

  test-standalone:
    name: build & test standalone (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    needs: [test-ubuntu, test-platforms]
    if: ${{ !startsWith(github.ref, 'refs/tags/api-v') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./packages/merger-plugin-api[test]"
          pip install "./packages/merger-cli[test,dev]"

      - name: (Linux) Install libmagic & nfpm
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y libmagic1
          echo "deb [trusted=yes] https://repo.goreleaser.com/apt/ /" | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update && sudo apt-get install -y nfpm

      - name: (macOS) Install libmagic
        if: matrix.os == 'macos-latest'
        run: brew install libmagic

      - name: Build and verify standalone
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            bash scripts/test_linux.sh
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            bash scripts/test_macos.sh
          else
            powershell -ExecutionPolicy Bypass -File scripts/test_windows.ps1
          fi